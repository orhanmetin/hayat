services:
  api:
    build:
      context: .
      dockerfile: backend/Dockerfile
      args:
        APP_VERSION: ${APP_VERSION:-latest}
    user: "0:0"
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_FORWARDEDHEADERS_ENABLED: "true"
      ConnectionStrings__DefaultConnection: Data Source=/data/hayat.db
      Cors__AllowedOrigins: ${PUBLIC_URL:-http://167.233.16.12}
      Jwt__SecretKey: ${JWT_SECRET:?JWT_SECRET is required}
      Jwt__Issuer: HayatApi
      Jwt__Audience: HayatApp
      Strava__ClientId: ${STRAVA_CLIENT_ID:-}
      Strava__ClientSecret: ${STRAVA_CLIENT_SECRET:-}
      Strava__RedirectUri: ${PUBLIC_URL:-http://167.233.16.12}/api/strava/callback
      Strava__FrontendRedirectUri: ${PUBLIC_URL:-http://167.233.16.12}/management/activity-types
      Strava__BackgroundSyncEnabled: "true"
      Strava__BackgroundSyncIntervalHours: "24"
      Strava__BackgroundSyncHourUtc: "2"
    volumes:
      - hayat-db:/data
      # Optional: use a pre-built DB from deploy/ (see deploy/HETZNER.md)
      # - ./deploy/hayat.initial.db:/data/hayat.db:ro
    networks:
      - hayat

  web:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: /api
    restart: unless-stopped
    ports:
      - "${HTTP_PORT:-80}:80"
    depends_on:
      - api
    networks:
      - hayat

volumes:
  hayat-db:

networks:
  hayat:
    driver: bridge
